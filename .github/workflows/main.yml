name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DEBUG: True
      # sqlite:///:memory: exige dj-database-url no Django. 
      # Se não usar, o Django ignorará essa variável e usará o db.sqlite3 padrão.
      DATABASE_URL: "sqlite:///:memory:" 
      SECRET_KEY: "ci-test-key"
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'meu-projeto-edu/backend/requirements.txt'

    - name: Install dependencies
      run: |
        cd meu-projeto-edu/backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 bandit dj-database-url # Garantindo que as ferramentas de CI existam

    - name: Run Lint (Qualidade)
      run: |
        cd meu-projeto-edu/backend
        # Para o CI se houver erros críticos (E9, F63, F7, F82)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Apenas avisa sobre o resto (PEP8), mas não trava o build (exit-zero)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Security Check (Segurança)
      run: |
        cd meu-projeto-edu/backend
        # --exit-zero permite que o build continue mesmo com avisos, 
        # mas gera o relatório de segurança nos logs.
        bandit -r . -x ./tests --exit-zero

    - name: Run tests
      run: |
        cd meu-projeto-edu/backend
        # O Django cria o banco de teste automaticamente, 
        # mas o migrate garante que seus modelos estão íntegros.
        python manage.py migrate
        python manage.py test

  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: meu-projeto-edu/frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd meu-projeto-edu/frontend
        npm ci

    - name: Run Lint & Audit
      run: |
        cd meu-projeto-edu/frontend
        npm run lint --if-present
        # Audit high level para produção (evita falsos positivos de pacotes de dev)
        npm audit --audit-level=high --production

    - name: Run build
      run: |
        cd meu-projeto-edu/frontend
        npm run build

  mobile:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        cache: true

    - name: Install dependencies
      run: |
        cd meu-projeto-edu/mobile
        flutter pub get

    - name: Static Analysis (Qualidade)
      run: |
        cd meu-projeto-edu/mobile
        # Garante que o código segue as boas práticas de Dart
        flutter analyze

    - name: Run tests
      run: |
        cd meu-projeto-edu/mobile
        flutter test

  docker:
    # Só builda se TUDO acima passar
    needs: [backend, frontend, mobile] 
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: |
        cd meu-projeto-edu/infra
        # Tagueando com o SHA do commit para rastreabilidade
        docker compose build --build-arg COMMIT_SHA=${{ github.sha }}