name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DEBUG: True
      DATABASE_URL: "sqlite:///:memory:" 
      SECRET_KEY: "ci-test-key"
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'meu-projeto-edu/backend/requirements.txt'

    - name: Install dependencies
      run: |
        cd meu-projeto-edu/backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 bandit dj-database-url

    - name: Run Lint (Qualidade)
      run: |
        cd meu-projeto-edu/backend
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Security Check (Segurança)
      run: |
        cd meu-projeto-edu/backend
        bandit -r . -x ./tests --exit-zero

    - name: Run tests
      run: |
        cd meu-projeto-edu/backend
        python manage.py migrate
        python manage.py test

  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        # Ajustado para package.json para evitar erro de resolução de caminho do cache
        cache-dependency-path: meu-projeto-edu/frontend/package.json

    - name: Install dependencies
      run: |
        cd meu-projeto-edu/frontend
        npm ci || npm install # Tenta ci, se falhar (sem lock), usa install

    - name: Run Lint & Audit
      run: |
        cd meu-projeto-edu/frontend
        npm run lint --if-present
        npm audit --audit-level=high --production

    - name: Run build
      run: |
        cd meu-projeto-edu/frontend
        npm run build

  mobile:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        cache: true

    - name: Install dependencies
      run: |
        cd meu-projeto-edu/mobile
        flutter pub get

    - name: Static Analysis (Qualidade)
      run: |
        cd meu-projeto-edu/mobile
        # Opção B: Roda a análise mas não falha o build por causa de warnings (como imports não usados)
        flutter analyze --no-fatal-warnings

    - name: Run tests
      run: |
        cd meu-projeto-edu/mobile
        flutter test

  docker:
    needs: [backend, frontend, mobile] 
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: |
        cd meu-projeto-edu/infra
        docker compose build --build-arg COMMIT_SHA=${{ github.sha }}